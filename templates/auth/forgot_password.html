{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card glass-card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold"><i class="fa-solid fa-key text-primary me-2"></i>Reset Password</h2>
                    <p class="text-muted">Enter your security answer to reset your password.</p>
                </div>
                <form method="POST" action="{{ url_for('forgot_password') }}">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control bg-light border-0" id="username" name="username" placeholder="johndoe" required>
                        <label for="username">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control bg-light border-0" id="answer" name="answer" placeholder="Security Answer" required>
                        <label for="answer">Security Answer</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control bg-light border-0" id="new_password" name="new_password" placeholder="New Password" required>
                        <label for="new_password">New Password</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold hover-lift">
                            Reset Password <i class="fa-solid fa-arrow-right-long ms-1"></i>
                        </button>
                    </div>
                </form>
                <div class="text-center mt-4 pt-3 border-top">
                    <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold text-muted"><i class="fa-solid fa-arrow-left"></i> Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold"><i class="bi bi-person-plus text-primary me-2"></i>Create Account</h2>
                    <p class="text-muted">Join us today to manage your tasks effortlessly.</p>
                </div>
                <form method="POST" action="{{ url_for('signup') }}">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="johndoe" required>
                        <label for="username">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                        <label for="confirm_password">Confirm Password</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-semibold">
                            Create Account <i class="bi bi-chevron-right ms-1"></i>
                        </button>
                    </div>
                </form>
                <div class="text-center mt-4 pt-3 border-top">
                    <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold">Log in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
